[phases.setup]
# libreoffice 추가 — PPTX → PDF → PNG 미리보기에 필요 (Phase 3-C)
nixPkgs = ["python312", "gcc", "libreoffice", "fontconfig"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  # RAG (옵셔널) — 설치 실패해도 빌드 통과 (rag_retriever 가 graceful skip)
  ". /opt/venv/bin/activate && pip install -r requirements-rag.txt || echo 'RAG deps install failed — RAG 비활성화 모드로 진행'",
]

[phases.build]
# static assets — no build step needed

# venv 의 bin 을 PATH 에 박아 컨테이너 시작 시 uvicorn/python 이 venv 의 것을 사용
# (Dockerfile 의 ENV PATH 로 변환됨 — sh -c 환경에서도 적용)
[variables]
PATH = "/opt/venv/bin:${PATH}"
PYTHONUNBUFFERED = "1"

# 절대경로로 venv python 호출 — PATH 가 안 잡혀도 안전하게 동작
[start]
cmd = "/opt/venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
