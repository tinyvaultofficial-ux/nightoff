[phases.setup]
# libreoffice — PPTX → PDF → PNG 미리보기 (Phase 3-C)
# noto-fonts-cjk-sans / nanum — 한글 폰트 (LibreOffice 가 PDF 변환 시 한글 렌더에 사용)
#   없으면 한글이 □ tofu 박스로 출력됨
#
# Spec D-Fix-ChromiumSharedLibs (D-Build-HTMLOutput 의 admin HTML 토글 ON 시 사용) —
# Railway 운영 로그 확정 에러:
#   "chrome: error while loading shared libraries: libglib-2.0.so.0: cannot open shared object file"
# 원인: Nixpacks 가 Nix 환경 → 'playwright install-deps' (apt 기반) 미동작.
# 해결: chromium headless 구동에 필요한 시스템 라이브러리를 nixPkgs 에 직접 명시.
# 재배포 반복 회피용 = 흔히 누락되는 부수 라이브러리 (Xrender / Xtst / Xi / Xcursor /
#   libXScrnSaver / libxshmfence / libGL / gtk3 / gdk-pixbuf) 까지 한번에 일괄 추가.
nixPkgs = ["python312", "gcc", "libreoffice", "fontconfig",
           "noto-fonts-cjk-sans", "nanum", "coreutils",
           # ── Nix chromium 본체 (Spec D-Fix-ChromiumNixSymlink) ───────
           # Playwright 다운로드 chromium = Nix store 의 .so 못 찾음 (LD_LIBRARY_PATH 미연결).
           # Nix chromium = 의존성 동봉 (self-contained, Nix 강점) → 동적 링킹 자동 해결.
           # 아래 install 단계에서 Playwright 의 chrome / chrome-headless-shell 을
           # 이 chromium 으로 ln -sf 심볼릭 교체 (코드의 p.chromium.executable_path 그대로 사용).
           "chromium",
           # ── chromium core deps (안전망 — symlink 실패해도 fallback) ───────
           "glib",                # libglib-2.0.so.0 (확정 누락 — 운영 로그 에러)
           "nss", "nspr",         # libnss3 / libnspr4
           "atk",                 # libatk-1.0
           "at-spi2-atk",         # libatk-bridge-2.0
           "at-spi2-core",        # libatspi
           "cups",                # libcups2 (인쇄 API — headless 도 동적 링킹)
           "dbus",                # libdbus-1
           "expat",               # libexpat
           "libdrm",              # libdrm (GPU 추상)
           "libxkbcommon",        # 키보드 입력
           "mesa",                # libgbm (GBM = headless 필수) + libGL/libEGL 포함
           "alsa-lib",            # libasound2 (오디오)
           "pango", "cairo",      # 텍스트 / 벡터 그래픽
           "freetype",            # 폰트 래스터
           # ── X11 libs (headless 도 동적 링킹 됨) ───────────────
           "xorg.libxcb",
           "xorg.libX11",
           "xorg.libXcomposite",
           "xorg.libXdamage",
           "xorg.libXext",
           "xorg.libXfixes",
           "xorg.libXrandr",
           "xorg.libXrender",
           "xorg.libXtst",
           "xorg.libXi",
           "xorg.libXcursor",
           "xorg.libXScrnSaver",  # ScreenSaver (대문자 S, Nix attr name 표준)
           # Spec D-Fix-ChromiumSharedLibs-2 — libxshmfence 는 xorg 네임스페이스.
           # Railway 빌드 에러 "undefined variable 'libxshmfence'" 확정 후 정정.
           "xorg.libxshmfence",   # GPU 동기화 (xorg 네임스페이스)
           "libGL",               # OpenGL (mesa 와 별도 명시 — 일부 환경 누락 방어)
           # ── GTK / 그래픽 stack ───────────────────────────────
           "gtk3",                # GTK3 (Linux 기본 UI toolkit, chrome 동적 링킹)
           "gdk-pixbuf"]          # 이미지 디코딩

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  # RAG (옵셔널) — 설치 실패해도 빌드 통과 (rag_retriever 가 graceful skip)
  ". /opt/venv/bin/activate && pip install -r requirements-rag.txt || echo 'RAG deps install failed — RAG 비활성화 모드로 진행'",
  # Paperlogy ttf 를 시스템 폰트로 등록 — LibreOffice 가 PPTX 변환 시 페이퍼로지 인식
  "mkdir -p /usr/share/fonts/truetype/paperlogy",
  "cp -f static/fonts/Paperlogy-*.ttf /usr/share/fonts/truetype/paperlogy/ 2>/dev/null || echo 'paperlogy ttf copy skipped'",
  # 폰트 캐시 강제 빌드 — LibreOffice 가 새 폰트를 즉시 인식하게
  "fc-cache -f 2>&1 | tail -3 || echo 'fc-cache skipped'",
  # Spec D-Fix-ChromiumInstall — Playwright chromium 본체 다운로드 (admin HTML 토글 ON 시에만 사용).
  # 두 명령 모두 graceful (|| echo) — 실패해도 빌드 통과:
  #   · 토글 OFF (policy_settings.output_mode_enabled='N', 기본값) 가 default
  #   · OFF 상태에서 generate_from_html 미호출 → chromium 없어도 서버 기동·기존 동작 영향 0
  #   · 토글 ON 시점에 chromium 미설치 = launch 에러 → main.py:6700 except 로 fallthrough
  # ~/.cache/ms-playwright/chromium-XXXX/chrome-linux/chrome 위치에 다운로드.
  ". /opt/venv/bin/activate && playwright install chromium 2>&1 | tail -5 || echo 'playwright install chromium failed — HTML 모드 비활성 (토글 OFF 면 영향 0)'",
  # Spec D-Fix-ChromiumSharedLibs — 'playwright install-deps chromium' 줄 제거.
  # 이유: Railway = Nix 환경 → apt-get 기반 install-deps 미동작 확정.
  # 대안: nixPkgs (phases.setup) 에 chromium 의존 시스템 라이브러리 직접 명시 (위 참조).
  #
  # Spec D-Fix-ChromiumNixSymlink — Playwright 가 다운로드한 chrome / chrome-headless-shell
  # 본체를 Nix chromium 으로 ln -sf 심볼릭 교체.
  # Nix chromium = 의존성 동봉 (LD_LIBRARY_PATH 자동 해결).
  # 코드 (pptx_generator.py:2508) 의 p.chromium.executable_path 가 가리키는 경로 그대로 작동.
  #
  # Spec D-Fix-ChromiumNixSymlink-2 — chromium 실행파일 탐색 견고화.
  # 'which chromium' 만으로 안 잡힘 (Nix chromium 실행파일명 다를 수 있거나 PATH 미등록).
  # 탐색 우선순위:
  #   1. which chromium               (PATH 에 있는 표준 이름)
  #   2. which chromium-browser       (Debian 계 이름)
  #   3. find /nix/store … chromium   (Nix store 직접 탐색, -maxdepth 4)
  #   4. find /nix/store … chromium-browser
  # 발견 후 readlink -f 로 심볼릭 풀어 실제 실행파일 경로 확정.
  # 디버깅 출력: which 결과 + find 결과 (상위 5개) + 최종 선택 경로.
  # graceful (else echo) — 실패해도 빌드 통과 (토글 OFF 면 영향 0).
  ". /opt/venv/bin/activate && echo '=== D-Fix-ChromiumNixSymlink-2 chromium 탐색 ===' && echo \"which chromium: $(which chromium 2>/dev/null || echo none)\" && echo \"which chromium-browser: $(which chromium-browser 2>/dev/null || echo none)\" && echo '/nix/store chromium 실행파일 (상위 5개):' && (find /nix/store -maxdepth 4 -type f \\( -name chromium -o -name chromium-browser \\) 2>/dev/null | head -5 || echo none) && NIX_CHROME=$(which chromium 2>/dev/null || which chromium-browser 2>/dev/null || find /nix/store -maxdepth 4 -type f -name chromium 2>/dev/null | head -1 || find /nix/store -maxdepth 4 -type f -name chromium-browser 2>/dev/null | head -1) && if [ -n \"$NIX_CHROME\" ] && [ -L \"$NIX_CHROME\" ]; then NIX_CHROME=$(readlink -f \"$NIX_CHROME\"); fi && echo \"최종 NIX_CHROME: ${NIX_CHROME:-NOTFOUND}\" && if [ -n \"$NIX_CHROME\" ] && [ -x \"$NIX_CHROME\" ]; then find ~/.cache/ms-playwright -maxdepth 3 -type f \\( -name chrome -o -name chrome-headless-shell \\) -print -exec ln -sf \"$NIX_CHROME\" {} \\; && echo 'symlink OK'; else echo 'Nix chromium symlink skip (chromium 실행파일 미발견)'; fi",
]

[phases.build]
# static assets — no build step needed

# venv 의 bin 을 PATH 에 박아 컨테이너 시작 시 uvicorn/python 이 venv 의 것을 사용
# (Dockerfile 의 ENV PATH 로 변환됨 — sh -c 환경에서도 적용)
[variables]
PATH = "/opt/venv/bin:${PATH}"
PYTHONUNBUFFERED = "1"

# 절대경로로 venv python 호출 — PATH 가 안 잡혀도 안전하게 동작
[start]
cmd = "/opt/venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
