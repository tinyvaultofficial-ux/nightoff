<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NightOff Admin Dashboard</title>
  <style>
    :root {
      --primary: #6b46e5;
      --primary-fg: #fff;
      --bg: #f8f8fa;
      --bg-card: #fff;
      --fg: #1a1a1a;
      --fg-2: #666;
      --border: #e5e5e9;
      --danger: #c43;
      --warn: #d96;
      --ok: #2a8;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg); color: var(--fg);
      line-height: 1.55;
    }
    .admin-shell { display: flex; flex-direction: column; min-height: 100vh; }
    .admin-header {
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 16px;
      box-shadow: var(--shadow-sm);
    }
    .admin-header h1 { margin: 0; font-size: 20px; }
    .admin-header .badge {
      background: var(--primary); color: var(--primary-fg);
      padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
    }
    .admin-header .user-info { margin-left: auto; font-size: 13px; color: var(--fg-2); }
    .admin-header .user-info button {
      margin-left: 8px; background: transparent; border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
    }

    .admin-tabs {
      display: flex; gap: 0; padding: 0 24px;
      background: var(--bg-card); border-bottom: 1px solid var(--border);
    }
    .admin-tab {
      padding: 12px 18px; cursor: pointer; border: none; background: transparent;
      font-size: 14px; color: var(--fg-2); border-bottom: 2px solid transparent;
      font-weight: 500;
    }
    .admin-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .admin-tab:hover:not(.active) { color: var(--fg); }

    .admin-body { padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .panel-header h2 { margin: 0; font-size: 18px; }
    .panel-header .meta { color: var(--fg-2); font-size: 13px; }

    .data-table {
      width: 100%; border-collapse: collapse; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
      box-shadow: var(--shadow-sm); font-size: 13px;
    }
    .data-table th, .data-table td {
      padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .data-table th { background: #f4f4f7; font-weight: 600; color: var(--fg-2); }
    .data-table tbody tr:hover { background: #fafafe; }
    .data-table .num { text-align: right; font-variant-numeric: tabular-nums; }

    .status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
    }
    .status-badge.active { background: #dfd; color: var(--ok); }
    .status-badge.suspended { background: #fdd; color: var(--danger); }
    .status-badge.admin { background: #def; color: var(--primary); }
    /* 오류 보고 상태 배지 */
    .status-badge.report-new { background: #fee2c5; color: #b65a00; }       /* 접수 — 주황 */
    .status-badge.report-progress { background: #d1e7ff; color: #0050b3; }  /* 처리중 — 파랑 */
    .status-badge.report-done { background: #dfd; color: var(--ok); }        /* 완료 — 녹색 */
    .err-msg-cell { max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .err-msg-cell:hover { white-space: normal; word-break: break-word; }

    .btn {
      padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg-card); cursor: pointer; font-size: 12px;
      transition: all 0.15s;
    }
    .btn:hover { background: #f4f4f7; }
    .btn.btn-primary { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
    .btn.btn-primary:hover { opacity: 0.9; }
    .btn.btn-danger { color: var(--danger); border-color: var(--danger); }
    .btn.btn-danger:hover { background: var(--danger); color: #fff; }

    /* 모달 */
    .modal-backdrop {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: var(--bg-card); border-radius: 10px; padding: 22px 26px;
      min-width: 400px; max-width: 600px; box-shadow: var(--shadow-md);
    }
    .modal h3 { margin: 0 0 14px; font-size: 17px; }
    .modal .form-row { margin-bottom: 12px; }
    .modal label { display: block; font-size: 12px; color: var(--fg-2); margin-bottom: 4px; }
    .modal input, .modal select, .modal textarea {
      width: 100%; padding: 8px 10px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 14px;
    }
    .modal textarea { min-height: 80px; resize: vertical; }
    .modal .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    /* 페이지네이션 */
    .pagination {
      display: flex; gap: 8px; justify-content: center; margin-top: 20px;
      align-items: center;
    }
    .pagination button { padding: 6px 12px; border: 1px solid var(--border); background: var(--bg-card); cursor: pointer; border-radius: 6px; }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination .page-info { font-size: 13px; color: var(--fg-2); }

    /* 로딩 / 빈 상태 */
    .loading, .empty {
      text-align: center; padding: 40px; color: var(--fg-2); font-size: 14px;
    }
    .error-banner {
      background: #fee; color: var(--danger); padding: 12px 16px; border-radius: 8px;
      margin-bottom: 16px; border: 1px solid #fcc;
    }

    /* 토스트 */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1a1a1a; color: #fff; padding: 12px 18px;
      border-radius: 8px; box-shadow: var(--shadow-md);
      z-index: 1100; opacity: 0; transition: opacity 0.2s;
      font-size: 13px;
    }
    .toast.show { opacity: 1; }
    .toast.ok { background: var(--ok); }
    .toast.error { background: var(--danger); }
  </style>
</head>
<body>
  <div class="admin-shell">
    <header class="admin-header">
      <h1>NightOff Admin</h1>
      <span class="badge">Dashboard</span>
      <div class="user-info">
        <span id="admin-email">로딩 중...</span>
        <button onclick="logout()">로그아웃</button>
      </div>
    </header>

    <nav class="admin-tabs">
      <button class="admin-tab active" data-tab="users">사용자 관리</button>
      <button class="admin-tab" data-tab="errors">오류 보고</button>
      <button class="admin-tab" data-tab="stats">통계</button>
      <button class="admin-tab" data-tab="settings">설정</button>
    </nav>

    <main class="admin-body">
      <!-- 탭 1: 사용자 관리 -->
      <section id="tab-users" class="tab-panel active">
        <div class="panel-header">
          <h2>사용자 관리</h2>
          <span class="meta" id="users-meta">로딩 중...</span>
        </div>
        <div id="users-error"></div>
        <div id="users-content">
          <div class="loading">사용자 목록 로딩 중...</div>
        </div>
        <div class="pagination" id="users-pagination" style="display:none;"></div>
      </section>

      <!-- 탭 2: 오류 보고 -->
      <section id="tab-errors" class="tab-panel">
        <div class="panel-header">
          <h2>오류 보고</h2>
          <div style="display:flex; gap:10px; align-items:center;">
            <select id="errors-filter" onchange="errorsApplyFilter()" style="padding:6px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px;">
              <option value="">전체 상태</option>
              <option value="접수">접수</option>
              <option value="처리중">처리중</option>
              <option value="완료">완료</option>
            </select>
            <span class="meta" id="errors-meta">로딩 중...</span>
          </div>
        </div>
        <div id="errors-error"></div>
        <div id="errors-content">
          <div class="loading">오류 보고 로딩 중...</div>
        </div>
        <div class="pagination" id="errors-pagination" style="display:none;"></div>
      </section>

      <section id="tab-stats" class="tab-panel">
        <div class="panel-header"><h2>통계</h2></div>
        <div class="empty">단계 3-C 진입 시 구현 예정.</div>
      </section>

      <section id="tab-settings" class="tab-panel">
        <div class="panel-header"><h2>설정</h2></div>
        <div class="empty">단계 3-D 진입 시 구현 예정 (백엔드 라우트 영역 영역 영역 추가 필요).</div>
      </section>
    </main>
  </div>

  <!-- 모달 컨테이너 -->
  <div id="modal-root"></div>

  <!-- 토스트 컨테이너 -->
  <div id="toast" class="toast"></div>

  <script src="/static/admin.js"></script>
</body>
</html>
