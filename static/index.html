<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NightOff — 기획자가 만든, 기획자만을 위한 제안서 AI</title>
  <meta name="description" content="NightOff · 기획자가 만든, 기획자만을 위한 제안서 AI. 밤새지 말자고 만들었습니다." />
  <link rel="icon" type="image/png" href="/static/logo.png" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app-root" class="app-shell"></div>

  <!-- 설정 아이콘 (좌하단 고정) -->
  <button id="settings-btn" class="settings-fab" aria-label="설정" title="설정">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </button>

  <!-- 토스트 -->
  <div id="toast-root" class="toast-root"></div>

  <!-- 설정 모달 -->
  <div id="settings-modal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>설정</h3>
        <button class="icon-btn" data-close-modal aria-label="닫기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Anthropic API Key</label>
          <input id="api-key-input" type="password" placeholder="sk-ant-api03-..." />
          <p id="api-key-status" class="field-hint">설정된 키 없음</p>
        </div>
        <div class="field">
          <label>모델</label>
          <select id="model-select">
            <option value="claude-sonnet-4-5-20250929">Claude Sonnet 4.5 (권장)</option>
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (빠름)</option>
            <option value="claude-opus-4-5-20250929">Claude Opus 4.5 (고품질)</option>
          </select>
        </div>
      </div>
      <div id="settings-diagnostic" class="settings-diagnostic hidden"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close-modal>취소</button>
        <button id="test-key" class="btn btn-outline">연결 테스트</button>
        <button id="save-settings" class="btn btn-primary">저장</button>
      </div>
    </div>
  </div>

  <!-- 전역 푸터 (모든 페이지 공통, 랜딩에서는 자체 푸터로 가려짐) -->
  <footer id="global-footer" class="global-footer">
    <div class="global-footer-inner">
      <div class="gf-row gf-links">
        <a href="#/about" data-link>서비스 소개</a>
        <span class="gf-sep">·</span>
        <a href="#/terms" data-link>이용약관</a>
        <span class="gf-sep">·</span>
        <a href="#/privacy" data-link>개인정보처리방침</a>
        <span class="gf-sep">·</span>
        <a href="mailto:hello@nightoff.ai">문의하기</a>
      </div>
      <div class="gf-row gf-info">
        <span>NightOff</span>
        <span class="gf-sep">·</span>
        <span>대표 크리스</span>
        <span class="gf-sep">·</span>
        <span>이메일 <a href="mailto:hello@nightoff.ai">hello@nightoff.ai</a></span>
        <span class="gf-sep">·</span>
        <span>고객센터 평일 09:00~18:00</span>
      </div>
      <div class="gf-row gf-bottom">
        <span class="gf-tag">수주를 진심으로 기원합니다 🙏</span>
        <div class="gf-social">
          <a href="https://www.instagram.com/" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>
          </a>
          <a href="https://www.linkedin.com/" target="_blank" rel="noopener" aria-label="LinkedIn" title="LinkedIn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/static/app.js" type="module"></script>
</body>
</html>
