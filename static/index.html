  <link rel="icon" type="image/png" href="/static/logo.png" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Paperlogy — 프레젠테이션 특화 한글 폰트 (자체 호스팅 · OFL 라이선스) -->
  <link rel="preload" as="font" type="font/ttf" crossorigin
    href="/static/fonts/Paperlogy-4Regular.ttf" />
  <link rel="preload" as="font" type="font/ttf" crossorigin
    href="/static/fonts/Paperlogy-7Bold.ttf" />
  <!-- SUIT Variable — 폴백 (Paperlogy 로딩 실패 시 또는 일부 글리프 부족 시) -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/variable/woff2/SUIT-Variable.css" />
  <!-- Pretendard Variable — 가독성 안전망 -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/proposal-viz.css" />
</head>
<body>
  <div id="app-root" class="app-shell"></div>

  <!-- 햄버거 (좁은 화면에서만 보임) -->
  <button id="nav-toggle" class="nav-toggle" aria-label="메뉴" aria-expanded="false">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="4" y1="6" x2="20" y2="6"/>
      <line x1="4" y1="12" x2="20" y2="12"/>
      <line x1="4" y1="18" x2="20" y2="18"/>
    </svg>
  </button>

  <!-- 사이드바 백드롭 (모바일 메뉴 열림 시) -->
  <div id="nav-backdrop" class="nav-backdrop" aria-hidden="true"></div>

  <!-- 설정 진입점은 좌측 사이드바 하단으로 이동 (이전 floating FAB 제거됨) -->

  <!-- 토스트 -->
  <div id="toast-root" class="toast-root"></div>

  <!-- 우측 사이드바 (rp-coming + 댕냥이 건강자세 + 작업 시간) 은 Spec 5 (5/16) 폐기. -->


  <!-- 설정 모달 -->
  <div id="settings-modal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>설정</h3>
        <button class="icon-btn" data-close-modal aria-label="닫기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Anthropic API Key</label>
          <input id="api-key-input" type="password" placeholder="sk-ant-api03-..." />
          <p id="api-key-status" class="field-hint">설정된 키 없음</p>
        </div>
        <div class="field">
          <label>모델</label>
          <select id="model-select">
            <option value="claude-sonnet-4-5-20250929">Claude Sonnet 4.5 (권장)</option>
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (빠름)</option>
            <option value="claude-opus-4-5-20250929">Claude Opus 4.5 (고품질)</option>
          </select>
        </div>
      </div>
      <div id="settings-diagnostic" class="settings-diagnostic hidden"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close-modal>취소</button>
        <button id="test-key" class="btn btn-outline">연결 테스트</button>
        <button id="save-settings" class="btn btn-primary">저장</button>
      </div>
      <!-- Spec D-Fix-9 (5/19) — 회원 탈퇴 링크 (작은 회색, 모달 하단) -->
      <div style="text-align: center; padding: 10px 22px 18px; border-top: 1px solid var(--border);">
        <a href="/withdraw.html" style="color: #999; font-size: 12px; text-decoration: underline;">회원 탈퇴</a>
      </div>
    </div>
  </div>

  <!-- 전역 푸터 (모든 페이지 공통, 랜딩에서는 자체 푸터로 가려짐) -->
  <footer id="global-footer" class="global-footer">
    <div class="global-footer-inner">
      <div class="gf-row gf-links">
        <a href="/terms">이용약관</a>
        <span class="gf-sep">·</span>
        <a href="/privacy">개인정보처리방침</a>
        <span class="gf-sep">·</span>
        <a href="mailto:awc@creworth.com">문의하기</a>
      </div>
      <div class="gf-row gf-info">
        <span>NightOff by 크리워스</span>
        <span class="gf-sep">·</span>
        <span>대표 이창원</span>
        <span class="gf-sep">·</span>
        <span>사업자번호 806-10-03267</span>
        <span class="gf-sep">·</span>
        <span>주소 서울시 관악구 조원로33길 30, 400호</span>
        <span class="gf-sep">·</span>
        <span>이메일 <a href="mailto:awc@creworth.com">awc@creworth.com</a></span>
        <span class="gf-sep">·</span>
        <span>전화 010-3169-9949</span>
        <span class="gf-sep">·</span>
        <span>고객센터 초기 응답 24시간 안 (영업일 기준)</span>
      </div>
      <div class="gf-row gf-bottom">
        <span class="gf-tag">수주를 진심으로 기원합니다 🙏</span>
        <div class="gf-social">
          <a href="https://www.instagram.com/" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>
          </a>
          <a href="https://www.linkedin.com/" target="_blank" rel="noopener" aria-label="LinkedIn" title="LinkedIn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/static/app.js" type="module"></script>

</html>
