<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원가입 · NightOff</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="preload" as="font" href="/static/fonts/Paperlogy-9Black.ttf" type="font/ttf" crossorigin />
  <link rel="preload" as="font" href="/static/fonts/Paperlogy-5Medium.ttf" type="font/ttf" crossorigin />
  <link rel="preload" as="font" href="/static/fonts/Paperlogy-4Regular.ttf" type="font/ttf" crossorigin />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body { background: #FAFAFA; font-family: 'Paperlogy', sans-serif; }
    .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { width: 100%; max-width: 380px; background: #fff; border: 1px solid #DDD; border-radius: 10px; padding: 32px 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
    .auth-brand { font-weight: 900; font-size: 28px; margin-bottom: 4px; color: #1A1A1A; letter-spacing: -0.5px; }
    .auth-tagline { font-size: 12px; color: #999; margin-bottom: 28px; }
    .auth-h1 { font-weight: 700; font-size: 18px; margin-bottom: 18px; color: #1A1A1A; }
    .auth-field { margin-bottom: 14px; }
    .auth-field label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; }
    .auth-field input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #DDD; border-radius: 6px; background: #FAFAFA; box-sizing: border-box; font-family: inherit; }
    .auth-field input:focus { outline: none; border-color: #1A1A1A; background: #fff; }
    .auth-hint { font-size: 11px; color: #999; margin-top: 4px; }
    .auth-btn { width: 100%; padding: 11px; background: #1A1A1A; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; font-family: inherit; }
    .auth-btn:hover { background: #333; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-footer { text-align: center; font-size: 12px; color: #999; margin-top: 18px; }
    .auth-footer a { color: #1A1A1A; font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .auth-error { font-size: 12px; color: #C0392B; margin-top: 12px; padding: 8px 10px; background: #FDEDEC; border-left: 3px solid #C0392B; border-radius: 4px; display: none; }
    .auth-error.show { display: block; }
    /* Spec D-Fix-7 (5/18) — 약관 동의 체크박스 (법적 필수, 일반 공개 전 critical) */
    .auth-terms { margin: 16px 0 8px; display: flex; flex-direction: column; gap: 8px; }
    .auth-terms-label { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: #555; cursor: pointer; line-height: 1.5; }
    .auth-terms-label input[type="checkbox"] { margin-top: 2px; flex-shrink: 0; }
    .auth-terms-label a { color: #6E56CF; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">NightOff</div>
      <div class="auth-tagline">야근 없이 끝내는 제안서, NightOff</div>
      <div class="auth-h1">회원가입</div>
      <form id="register-form">
        <div class="auth-field">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required />
          <div class="auth-hint">8자 이상, 영문 + 숫자 포함.</div>
        </div>
        <div class="auth-field">
          <label for="company">회사 (선택)</label>
          <input type="text" id="company" name="company" autocomplete="organization" />
        </div>
        <div class="auth-terms">
          <label class="auth-terms-label">
            <input type="checkbox" id="terms_agreed" required />
            <span><a href="/terms" target="_blank">이용약관</a>에 동의합니다 (필수)</span>
          </label>
          <label class="auth-terms-label">
            <input type="checkbox" id="privacy_agreed" required />
            <span><a href="/privacy" target="_blank">개인정보처리방침</a>에 동의합니다 (필수)</span>
          </label>
        </div>
        <button type="submit" class="auth-btn" id="submit-btn" disabled>가입하고 시작하기</button>
        <div class="auth-error" id="error-msg"></div>
      </form>
      <div class="auth-footer">
        이미 계정이 있으세요? <a href="/login.html">로그인</a>
      </div>
    </div>
  </div>

  <script>
    const AUTH_TOKEN_KEY = "nightoff_jwt";
    const form = document.getElementById("register-form");
    const errorEl = document.getElementById("error-msg");
    const btn = document.getElementById("submit-btn");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add("show");
    }
    function clearError() {
      errorEl.classList.remove("show");
      errorEl.textContent = "";
    }

    if (localStorage.getItem(AUTH_TOKEN_KEY)) {
      location.href = "/";
    }

    // Spec D-Fix-7 (5/18) — 약관 체크박스 영역 둘 다 체크 시에만 가입 버튼 활성
    const termsCheckbox = document.getElementById("terms_agreed");
    const privacyCheckbox = document.getElementById("privacy_agreed");
    function updateSubmitState() {
      btn.disabled = !(termsCheckbox.checked && privacyCheckbox.checked);
    }
    termsCheckbox.addEventListener("change", updateSubmitState);
    privacyCheckbox.addEventListener("change", updateSubmitState);
    updateSubmitState();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();
      btn.disabled = true;
      btn.textContent = "가입 중...";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const company = document.getElementById("company").value.trim();
      const terms_agreed = termsCheckbox.checked;
      const privacy_agreed = privacyCheckbox.checked;
      try {
        const r = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, company, terms_agreed, privacy_agreed }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          if (r.status === 400) showError(data.detail || "입력 형식을 확인해 주세요.");
          else if (r.status === 409) showError(data.detail || "이미 가입된 이메일이에요. 로그인해 주세요.");
          else showError(data.detail || "가입에 실패했어요. 다시 시도해 주세요.");
          return;
        }
        localStorage.setItem(AUTH_TOKEN_KEY, data.token);
        location.href = "/";
      } catch (err) {
        showError("서버에 연결할 수 없어요. 네트워크를 확인해 주세요.");
      } finally {
        btn.disabled = false;
        btn.textContent = "가입하고 시작하기";
      }
    });
  </script>
</body>
</html>
